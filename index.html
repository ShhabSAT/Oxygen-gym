<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!--
      Disable pinch-zoom + double-tap-zoom. This is an internal staff tool (not a
      public site), so we intentionally accept the a11y tradeoff of removing
      user scaling to make the PWA feel like a native app, not a browser page.
      NOTE: iOS Safari ignores user-scalable=no since iOS 10, so index.js also
      blocks gesturestart/gesturechange to stop pinch-zoom on iOS.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#121212" />
    <meta name="description" content="تطبيق إدارة نادي أكسجين الرياضي" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <title>Oxygen Gym</title>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Block iOS Safari pinch-zoom. iOS ignores user-scalable=no (since iOS 10),
      but preventing gesturestart/gesturechange stops the pinch gesture.
    -->
    <!--
      Block native browser context menu + image drag ghost.
      The app has zero need for the browser's "Open in new tab /
      Save Image / Copy" popups — everything is custom-built.
    -->
    <script>
      document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
      document.addEventListener('gesturechange', function (e) { e.preventDefault(); });
      document.addEventListener('gestureend', function (e) { e.preventDefault(); });
      document.addEventListener('contextmenu', function (e) { e.preventDefault(); });
      document.addEventListener('dragstart', function (e) { e.preventDefault(); });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
